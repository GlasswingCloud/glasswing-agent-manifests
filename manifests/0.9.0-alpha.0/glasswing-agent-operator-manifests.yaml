apiVersion: v1
kind: Namespace
metadata:
  name: glasswing-agent-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glasswing-agent-operator
  namespace: glasswing-agent-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: glasswing-agent-operator
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
- nonResourceURLs:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: glasswing-agent-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: glasswing-agent-operator
subjects:
- kind: ServiceAccount
  name: glasswing-agent-operator
  namespace: glasswing-agent-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: glasswing-agent-operator
  name: glasswing-agent-operator
  namespace: glasswing-agent-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glasswing-agent-operator
  template:
    metadata:
      labels:
        app: glasswing-agent-operator
    spec:
      automountServiceAccountToken: true
      containers:
      - command:
        - /usr/local/bin/glasswing-agent-operator
        - run
        - --v=2
        image: quay.io/glasswing/agent-operator:0.9.0-alpha.0
        imagePullPolicy: Always
        name: operator
        readinessProbe:
          failureThreshold: 1
          httpGet:
            path: /readyz
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 20m
            memory: 50Mi
          requests:
            cpu: 20m
            memory: 50Mi
        terminationMessagePolicy: FallbackToLogsOnError
      priorityClassName: system-cluster-critical
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: glasswing-agent-operator
---
apiVersion: operator.glasswing.cloud/v1alpha1
kind: ClientStack
metadata:
  name: cluster
spec: {}
