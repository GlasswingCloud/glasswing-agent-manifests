                description: |-
                  forceOwnership forces the installation to proceed even if there are existing resources
                  that are not owned by this operator, nor match its selector to adopt them.
                  Using forceOwnership lets the operator take over the resources without a controllerRef and overwrite them.
                  Use it with caution and unset this option after the desired state is reached.
