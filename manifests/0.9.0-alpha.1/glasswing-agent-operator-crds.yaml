          metadata:
            type: object
          spec:
            description: spec defines the desired state of this Glasswing agent.
            properties:
              agentConfiguration:
                description: agentConfiguration holds the AgentConfigurationSpec that
                  controls the agent behaviour.
                properties:
                  clusterName:
                    description: |-
                      clusterName sets an explicit cluster name.
                      If not set, the agent will try to infer it from cluster provider APIs.
                    type: string
                  gatewayURL:
                    description: |-
                      gatewayURL overrides the default Glasswing gateway URL.
                      Except for exceptional circumstances, this should be left empty.
                    type: string
                    x-kubernetes-validations:
                    - message: Has to be a valid URL using https:// or http:// scheme.
                      rule: url(self).getScheme() in ['https', 'http']
                  providerTypes:
                    description: |-
                      providerTypes sets infra providers to use.
                      If not set, the agent will try to infer it from the cluster or infra provider APIs.
                    items:
                      description: InfraProviderChoiceType defines which infra provider
                        to use.
                      enum:
                      - Auto-detect
                      - BareMetal
                      - EKS
                      - GKE
                      - AKS
                      type: string
                    maxItems: 1
                    type: array
                type: object
              agentSecretName:
                default: glasswing-agent-credentials
                description: |-
                  agentSecretName holds the name of the secret containing credentials to connect to the Glasswing gateway.
                  Users are required to create the Secret that holds the API_KEY.
                minLength: 1
                type: string
